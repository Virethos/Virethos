<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Virethos Admin</title>

<link rel="stylesheet" href="admin.css">
</head>

<body>

<!-- ================= LOGIN ================= -->

<div id="loginScreen">

  <div class="login-card">

    <h1>Admin Virethos</h1>

    <input
      type="email"
      id="loginEmail"
      placeholder="E-mail"
    >

    <input
      type="password"
      id="loginPassword"
      placeholder="Mot de passe"
    >

    <button id="loginBtn">
      Se connecter
    </button>

    <p id="loginError"></p>

  </div>

</div>

<!-- ================= ADMIN ================= -->

<div id="adminPanel" style="display:none;">

<header>
  <div onclick="toggleSidebar()">☰</div>
  <h1>Admin Virethos</h1>

  <button id="logoutBtn">
    Déconnexion
  </button>

</header>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

  <p onclick="closeSidebar()">
    ✕ Fermer
  </p>

  <p onclick="showAdd()">
    ➕ Ajouter produit
  </p>

  <p onclick="showProducts()">
    📦 Produits
  </p>

</div>

<main class="container">

<div id="addPage">

<h2>Ajouter produit</h2>

<form id="productForm">

<input
id="name"
placeholder="Nom produit"
required>

<input
id="price"
type="number"
placeholder="Prix"
required>

<input
id="quantity"
type="number"
min="0"
placeholder="Quantité disponible"
required>

<input
type="file"
id="images"
multiple
accept="image/*">

<button type="submit">
Ajouter
</button>

</form>

<div id="preview"></div>

</div>

<div id="productsPage" style="display:none;">

<h2>Produits</h2>

<div id="list"></div>

</div>

</main>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
